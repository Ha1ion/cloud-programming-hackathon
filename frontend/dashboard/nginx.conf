server {
  listen 80;

  location /events {
    proxy_pass http://ec2-3-27-62-158.ap-southeast-2.compute.amazonaws.com/events;
    proxy_set_header Host ec2-3-27-62-158.ap-southeast-2.compute.amazonaws.com;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}